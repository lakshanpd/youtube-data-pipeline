youtube:
  search:
    region_code: "LK"
    parts: "snippet"
    order: "date"
    max_results_per_page: 50
    max_videos_per_run: 200
    keywords:
      - "Sri Lanka news"
      - "Sri Lanka music"
      - "Sri Lanka"
      - "Lanka"
      - "Colombo"
      - "ශ්‍රී ලංකා"        # Sinhala script
      - "இலங்கை"             # Tamil script

  videos:
    parts: "snippet,statistics,contentDetails"
    max_ids_per_request: 50  # YouTube API hard limit

minio:
  endpoint: "localhost:9000"
  access_key: ${MINIO_ROOT_USER}      # resolved from .env
  secret_key: ${MINIO_ROOT_PASSWORD}  # resolved from .env
  secure: false                        # true in production (HTTPS)

postgres:
  host: ${POSTGRES_HOST}         # resolved from .env
  port: ${POSTGRES_PORT}         # resolved from .env — 5433 locally to avoid clash with Homebrew Postgres
  dbname: ${POSTGRES_DB}         # resolved from .env
  user: ${POSTGRES_USER}         # resolved from .env
  password: ${POSTGRES_PASSWORD} # resolved from .env
